version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/price_tier_classifier_v1.pkl
      - RECOMMENDER_PATH=/app/models/recommender_index.pkl
      - CATEGORY_MODEL_PATH=/app/models/category_classifier_v1.pkl
    volumes:
      - ../models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    image: python:3.11-slim
    working_dir: /app
    command: >
      bash -c "pip install -r requirements.txt -q &&
               streamlit run streamlit_app/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    environment:
      - MODEL_PATH=/app/models/price_tier_classifier_v1.pkl
        - RECOMMENDER_PATH=/app/models/recommender_index.pkl
        - CATEGORY_MODEL_PATH=/app/models/category_classifier_v1.pkl
      - API_URL=http://api:8000
    volumes:
      - ..:/app
    depends_on:
      - api
